<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autoplay Video</title>
    <style>
        #video {
            display: block;
            margin: 20px auto;
            position: relative;
            z-index: 2;
        }
    </style>
</head>
<body>
    <div>
        <video id="video" width="320" height="180" autoplay muted playsinline>
            <source src="videos/nod.mp4" type="video/mp4">
            Dein Browser unterstützt dieses Videoformat nicht.
        </video>
    </div>

    <script>
        // Optional: sicherstellen, dass das Video beim Laden abgespielt wird
        window.addEventListener('load', function() {
            var video = document.getElementById("video");
            video.play().catch(error => {
                console.log("Autoplay blockiert: ", error);
            });
        });
    </script>
</body>
</html>
